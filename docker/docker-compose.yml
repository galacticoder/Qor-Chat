services:
  redis:
    profiles: ["server", "loadbalancer", "redis-standalone"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.redis
    hostname: redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TS_AUTHKEY=${TS_AUTHKEY}
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - redis-data:/data
      - redis-certs:/certs
      - tailscale-redis:/var/lib/tailscale
    tmpfs:
      - /var/run/tailscale
    networks:
      - Qor-Chat-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/certs/redis-client.crt", "--key", "/certs/redis-client.key", "--cacert", "/certs/redis-ca.crt", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  postgres:
    profiles: ["server"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    hostname: postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-certs:/var/lib/postgresql/certs
    ports:
      - "${DB_PORT}:5432" 
    networks:
      - Qor-Chat-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost"]
      interval: 2s
      timeout: 5s
      retries: 30

  pir-worker:
    profiles: ["server"]
    build:
      # builds from hintless source in workers/hintless/upstream
      context: ../workers/hintless
      dockerfile: Dockerfile
    hostname: pir-worker
    environment:
      - QOR_PIR_BIND=0.0.0.0:8787
      - QOR_PIR_PARAMETER_ID=${PIR_WORKER_PARAMETER_ID:-hintless-simplepir-rlwe64-v1}
      - QOR_PIR_AUTH_TOKEN=${PIR_WORKER_TOKEN:-}
      - QOR_PIR_MAX_DATABASE_BYTES=${PIR_WORKER_MAX_DATABASE_BYTES:-2147483648}
      - QOR_PIR_MAX_REQUEST_BYTES=${PIR_WORKER_MAX_REQUEST_BYTES:-268435456}
    networks:
      - Qor-Chat-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${PIR_WORKER_CPUS:-0}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  # YPIR tier-2 worker
  ypir-worker:
    profiles: ["server"]
    build:
      context: ../workers/ypir
      dockerfile: Dockerfile
    hostname: ypir-worker
    environment:
      - YPIR_WORKER_ADDR=0.0.0.0:8788
      - YPIR_BLOB_LEN=${YPIR_BLOB_LEN:-65536}
    networks:
      - Qor-Chat-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "${YPIR_WORKER_CPUS:-0}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8788/health"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    profiles: ["server"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    hostname: server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - BIND_ADDRESS=0.0.0.0
      - PIR_WORKER_URL=${PIR_WORKER_URL:-http://pir-worker:8787}
      - PIR_WORKER_PARAMETER_ID=${PIR_WORKER_PARAMETER_ID:-hintless-simplepir-rlwe64-v1}
      - PIR_WORKER_SOURCE_COMMIT=49434e086ec56d19546ca6e97353671b690ba19b
      - PIR_REQUIRE_WORKER=${PIR_REQUIRE_WORKER:-true}
      - YPIR_TIER2_WORKER_URL=${YPIR_TIER2_WORKER_URL:-http://ypir-worker:8788}
      - YPIR_TIER2_BLOB_LEN=${YPIR_BLOB_LEN:-65536}
      - RUNTIME_DIAGNOSTIC_LOG_DIR=${RUNTIME_DIAGNOSTIC_LOG_DIR:-/app/logs}
      - NO_GUI
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      pir-worker:
        condition: service_healthy
      ypir-worker:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - Qor-Chat-net
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ../.env:/app/.env 
      - ../scripts:/app/scripts:rw
      - ../server:/app/server:rw
      - ../logs:/app/logs:rw
      - tailscale-data:/var/lib/tailscale
      - redis-certs:/app/redis-certs:ro
      - postgres-certs:/app/postgres-certs:ro
    tmpfs:
      - /var/run/tailscale
    restart: unless-stopped

  loadbalancer:
    profiles: ["loadbalancer"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.loadbalancer
    hostname: loadbalancer
    ports:
      - "${HAPROXY_HTTPS_PORT:-8443}:8443"
      - "${HAPROXY_STATS_PORT:-8404}:8404"
    env_file:
      - ../.env
    environment:
      - REDIS_CA_CERT_PATH=/app/redis-certs/redis-ca.crt
      - REDIS_CLIENT_CERT_PATH=/app/redis-certs/redis-client.crt
      - REDIS_CLIENT_KEY_PATH=/app/redis-certs/redis-client.key
      - REDIS_TLS_SERVERNAME=redis
      - TS_AUTHKEY=${TS_AUTHKEY}
      - NO_GUI
    depends_on:
      redis:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - Qor-Chat-net
    volumes:
      - ../.env:/app/.env
      - ../scripts:/app/scripts:rw
      - ../server:/app/server:rw
      - redis-certs:/app/redis-certs:ro
      - tailscale-loadbalancer:/var/lib/tailscale
    tmpfs:
      - /var/run
    restart: unless-stopped

networks:
  Qor-Chat-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: Qor-Chat-br
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16

volumes:
  postgres-data:
  postgres-certs:
  tailscale-data:
  tailscale-redis:
  tailscale-loadbalancer:
  redis-data:
  redis-certs:
